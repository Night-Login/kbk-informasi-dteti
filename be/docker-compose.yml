services:
  database:
    image: postgres:17
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kbk-backend}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kbk-backend}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - kbk_postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./express
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - database
    ports:
      - "5000:5000"
    volumes:
      - ./express/uploads:/app/uploads
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB}

volumes:
  kbk_postgres_data:
