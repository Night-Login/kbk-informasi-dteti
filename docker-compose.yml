services:
  database:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kbk-backend}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-kbk-backend}",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
    volumes:
      - kbk_postgres_data:/var/lib/postgresql/data

  database_init:
    build:
      context: ./be/express
      dockerfile: Dockerfile
      target: builder
    depends_on:
      database:
        condition: service_healthy
    environment:
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-kbk-backend}
      SUPERADMIN_USERNAME: ${SUPERADMIN_USERNAME:-superadmin}
      SUPERADMIN_PASSWORD: ${SUPERADMIN_PASSWORD}
    command: >
      sh -c "npx prisma migrate deploy &&
      npx tsx prisma/seed.ts"
    restart: "no"

  backend:
    build:
      context: ./be/express
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      database_init:
        condition: service_completed_successfully
    expose:
      - "5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      DB_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@database:5432/${POSTGRES_DB:-kbk-backend}
      FRONTEND_URLS: ${FRONTEND_URLS:-http://localhost}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-2h}
      DB_POOL_MAX: ${DB_POOL_MAX:-10}
      DB_CONNECT_TIMEOUT_MS: ${DB_CONNECT_TIMEOUT_MS:-10000}
      DB_IDLE_TIMEOUT_MS: ${DB_IDLE_TIMEOUT_MS:-30000}
    volumes:
      - backend_uploads:/app/uploads

  frontend:
    build:
      context: ./fe
      dockerfile: dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: 1
      PORT: 3000
      HOSTNAME: 0.0.0.0

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  kbk_postgres_data:
  backend_uploads:
